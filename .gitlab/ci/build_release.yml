---

docker:manual_build_amd64:
  extends:
    - .build_docker_release_template
    - .rules_template__development_docker
  variables:
    IMAGE_ARCH_PREFIX: "amd64_"
  stage: manual
  needs: []

docker:manual_build_arm64:
  extends:
    - .build_docker_release_template
    - .rules_template__development_docker
  variables:
    IMAGE_ARCH_PREFIX: "arm64_"
  stage: manual
  needs: []
  tags:
    - arm64

docker:build_amd64:
  extends:
    - .docker:build_amd64
    - .rules_template__master_and_releases

docker:build_arm64:
  extends:
    - .docker:build_arm64
    - .rules_template__master_and_releases
