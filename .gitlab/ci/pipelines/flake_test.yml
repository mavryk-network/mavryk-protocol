# interruptible makes less sense on manual pipelines
default:
  interruptible: false

include:
  - local: .gitlab/ci/jobs/build/x86_64.yml
    rules:
    - if: '$TZ_FLAKE_TEST == "tezt"'

  - local: .gitlab/ci/jobs/build/kernels.yml
    rules:
    - if: '$TZ_FLAKE_TEST == "tezt"'

  - local: .gitlab/ci/jobs/test/unit_js_components_flake.yml
    rules:
    - if: '$TZ_FLAKE_TEST == "unit_js_components"'

  - local: .gitlab/ci/jobs/test/tezt_flake.yml
    rules:
    - if: '$TZ_FLAKE_TEST == "tezt"'
